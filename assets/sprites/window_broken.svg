<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Broken background -->
  <polygon points="0,0 40,0 20,40 0,50" fill="#90CAF9" />
  <polygon points="60,0 100,0 100,30 80,50" fill="#90CAF9" />
  <polygon points="0,70 30,50 100,80 100,100 0,100" fill="#90CAF9" />
  
  <!-- Frame -->
  <rect width="100" height="100" fill="none" stroke="#FFFFFF" stroke-width="8" />
  
  <line x1="50" y1="0" x2="50" y2="10" stroke="#FFFFFF" stroke-width="6"/>
  <line x1="50" y1="90" x2="50" y2="100" stroke="#FFFFFF" stroke-width="6"/>
  
  <line x1="0" y1="50" x2="20" y2="50" stroke="#FFFFFF" stroke-width="6"/>
  <line x1="80" y1="50" x2="100" y2="50" stroke="#FFFFFF" stroke-width="6"/>
</svg>
